name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfontconfig1-dev pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Sistema de Gestão Paroquial v__VERSION__'
          releaseBody: |
            Instaladores do Sistema de Gestão Paroquial.

            **macOS:** Baixar o .dmg correspondente ao seu processador (aarch64 = Apple Silicon, x64 = Intel)
            **Windows:** Baixar o .msi ou .nsis
            **Linux:** Baixar o .AppImage ou .deb
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Collect signatures
        shell: bash
        run: |
          mkdir -p sigs
          find src-tauri/target -name "*.sig" -type f 2>/dev/null | while read f; do
            basename=$(basename "$f")
            cp "$f" "sigs/$basename"
            echo "Found signature: $basename"
          done
          ls -la sigs/ || echo "No signatures found"

      - name: Upload signatures artifact
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.platform }}-${{ matrix.rust_target || 'default' }}
          path: sigs/
          if-no-files-found: ignore

  updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sigs-*
          path: all-sigs/
          merge-multiple: true

      - name: List collected signatures
        run: ls -laR all-sigs/ 2>/dev/null || echo "No sigs dir"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          get_sig() {
            local file="all-sigs/$1.sig"
            if [ -f "$file" ]; then
              cat "$file"
            else
              echo ""
            fi
          }

          # macOS signatures — the .app.tar.gz gets signed
          DARWIN_AARCH64_SIG=$(get_sig "sistema-de-gestao-paroquial.app.tar.gz")
          DARWIN_X64_SIG=$(get_sig "sistema-de-gestao-paroquial.app.tar.gz")

          # If both mac builds produce the same filename, try platform-specific names
          if [ -f "all-sigs/sistema-de-gestao-paroquial_aarch64.app.tar.gz.sig" ]; then
            DARWIN_AARCH64_SIG=$(cat "all-sigs/sistema-de-gestao-paroquial_aarch64.app.tar.gz.sig")
          fi
          if [ -f "all-sigs/sistema-de-gestao-paroquial_x64.app.tar.gz.sig" ]; then
            DARWIN_X64_SIG=$(cat "all-sigs/sistema-de-gestao-paroquial_x64.app.tar.gz.sig")
          fi

          # Linux — AppImage gets signed
          LINUX_SIG=$(get_sig "sistema-de-gestao-paroquial_${VERSION}_amd64.AppImage.tar.gz")

          # Windows — NSIS exe gets signed
          WINDOWS_SIG=$(get_sig "sistema-de-gestao-paroquial_${VERSION}_x64-setup.nsis.zip")
          if [ -z "$WINDOWS_SIG" ]; then
            WINDOWS_SIG=$(get_sig "sistema-de-gestao-paroquial_${VERSION}_x64-setup.exe")
          fi

          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Build JSON
          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Sistema de Gestão Paroquial v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X64_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat latest.json

          # Validate signatures are not empty
          EMPTY_COUNT=$(grep -c '"signature": ""' latest.json || true)
          if [ "$EMPTY_COUNT" -gt 0 ]; then
            echo "::warning::${EMPTY_COUNT} platform(s) have empty signatures. Auto-update may not work for those platforms."
          fi

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" latest.json --repo "${{ github.repository }}" --clobber
