name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfontconfig1-dev pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Sistema de Gestão Paroquial v__VERSION__'
          releaseBody: |
            Instaladores do Sistema de Gestão Paroquial.

            **macOS:** Baixar o .dmg correspondente ao seu processador (aarch64 = Apple Silicon, x64 = Intel)
            **Windows:** Baixar o .msi ou .nsis
            **Linux:** Baixar o .AppImage ou .deb
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload signature files
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.platform }}-${{ matrix.rust_target || 'default' }}
          path: src-tauri/target/**/bundle/**/*.sig
          if-no-files-found: warn

  updater-json:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sigs-*
          path: all-sigs/
          merge-multiple: true

      - name: List collected signatures
        run: |
          echo "=== All signature files ==="
          find all-sigs/ -name "*.sig" -type f 2>/dev/null || echo "No .sig files found"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          get_sig() {
            for name in "$@"; do
              local found=$(find all-sigs/ -name "${name}.sig" -type f 2>/dev/null | head -1)
              if [ -n "$found" ] && [ -f "$found" ]; then
                cat "$found"
                return
              fi
            done
            echo ""
          }

          DARWIN_AARCH64_SIG=$(get_sig "sistema-de-gestao-paroquial.app.tar.gz")
          DARWIN_X64_SIG=$(get_sig "sistema-de-gestao-paroquial.app.tar.gz")
          LINUX_SIG=$(get_sig "sistema-de-gestao-paroquial_${VERSION}_amd64.AppImage.tar.gz")
          WINDOWS_SIG=$(get_sig \
            "sistema-de-gestao-paroquial_${VERSION}_x64-setup.nsis.zip" \
            "sistema-de-gestao-paroquial_${VERSION}_x64-setup.exe" \
            "sistema-de-gestao-paroquial_${VERSION}_x64_pt-BR.msi.zip" \
            "sistema-de-gestao-paroquial_${VERSION}_x64_pt-BR.msi")

          echo "Signatures found:"
          echo "  darwin-aarch64: ${DARWIN_AARCH64_SIG:0:20}..."
          echo "  darwin-x64: ${DARWIN_X64_SIG:0:20}..."
          echo "  linux: ${LINUX_SIG:0:20}..."
          echo "  windows: ${WINDOWS_SIG:0:20}..."

          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Sistema de Gestão Paroquial v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X64_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_${VERSION}_x64-setup.exe"
              }
            }
          }
          ENDJSON

          echo ""
          echo "Generated latest.json:"
          cat latest.json

          EMPTY_COUNT=$(grep -c '"signature": ""' latest.json || true)
          if [ "$EMPTY_COUNT" -gt 0 ]; then
            echo "::warning::${EMPTY_COUNT} platform(s) have empty signatures"
          fi

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" latest.json --repo "${{ github.repository }}" --clobber
