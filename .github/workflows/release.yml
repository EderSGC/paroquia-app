name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfontconfig1-dev pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Sistema de Gestão Paroquial v__VERSION__'
          releaseBody: |
            Instaladores do Sistema de Gestão Paroquial.

            **macOS:** Baixar o .dmg correspondente ao seu processador (aarch64 = Apple Silicon, x64 = Intel)
            **Windows:** Baixar o .msi ou .nsis
            **Linux:** Baixar o .AppImage ou .deb
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sigs-${{ matrix.platform }}-${{ matrix.rust_target || 'default' }}
          path: |
            src-tauri/target/**/release/bundle/**/*.sig
          if-no-files-found: warn

  updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: sigs-*
          merge-multiple: true

      - name: List all signatures
        run: find sigs -name "*.sig" -type f 2>/dev/null || echo "No signatures found"

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          get_sig() {
            for pattern in "$@"; do
              local file=$(find sigs -name "${pattern}.sig" -type f 2>/dev/null | head -1)
              if [ -n "$file" ] && [ -f "$file" ]; then
                cat "$file"
                return
              fi
            done
            echo ""
          }

          DARWIN_AARCH64_SIG=$(get_sig "sistema-de-gestao-paroquial.app.tar.gz")
          # aarch64 and x64 have same tar.gz name — disambiguate by path
          DARWIN_AARCH64_SIG=$(find sigs -path "*aarch64*" -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1 | xargs cat 2>/dev/null || echo "")
          DARWIN_X64_SIG=$(find sigs -path "*x86_64*" -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1 | xargs cat 2>/dev/null || echo "")
          LINUX_SIG=$(get_sig "sistema-de-gestao-paroquial_${VERSION}_amd64.AppImage.tar.gz")
          WINDOWS_SIG=$(get_sig \
            "sistema-de-gestao-paroquial_${VERSION}_x64-setup.nsis.zip" \
            "sistema-de-gestao-paroquial_${VERSION}_x64-setup.exe" \
            "sistema-de-gestao-paroquial_${VERSION}_x64_pt-BR.msi.zip" \
            "sistema-de-gestao-paroquial_${VERSION}_x64_pt-BR.msi")

          # Determine Windows URL based on which sig we found
          WIN_URL="${BASE}/sistema-de-gestao-paroquial_${VERSION}_x64-setup.nsis.zip"
          if [ -z "$WINDOWS_SIG" ]; then
            WIN_URL="${BASE}/sistema-de-gestao-paroquial_${VERSION}_x64-setup.exe"
          fi

          echo "=== Signatures ==="
          echo "  darwin-aarch64: ${DARWIN_AARCH64_SIG:0:40}..."
          echo "  darwin-x64:     ${DARWIN_X64_SIG:0:40}..."
          echo "  linux:          ${LINUX_SIG:0:40}..."
          echo "  windows:        ${WINDOWS_SIG:0:40}..."

          EMPTY_COUNT=0
          [ -z "$DARWIN_AARCH64_SIG" ] && EMPTY_COUNT=$((EMPTY_COUNT + 1))
          [ -z "$DARWIN_X64_SIG" ] && EMPTY_COUNT=$((EMPTY_COUNT + 1))
          [ -z "$LINUX_SIG" ] && EMPTY_COUNT=$((EMPTY_COUNT + 1))
          [ -z "$WINDOWS_SIG" ] && EMPTY_COUNT=$((EMPTY_COUNT + 1))

          if [ "$EMPTY_COUNT" -eq 4 ]; then
            echo "::error::ALL signatures are empty! The signing key is likely invalid."
            exit 1
          fi
          if [ "$EMPTY_COUNT" -gt 0 ]; then
            echo "::warning::${EMPTY_COUNT} platform(s) have empty signatures"
          fi

          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Sistema de Gestão Paroquial v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X64_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE}/sistema-de-gestao-paroquial_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${WIN_URL}"
              }
            }
          }
          ENDJSON

          echo ""
          echo "=== Generated latest.json ==="
          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" latest.json --repo "${{ github.repository }}" --clobber
